
# AtlasBurn App Hosting Configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Maintain institutional availability
  minInstances: 0
  maxInstances: 2
  # Next.js 15 requires sufficient memory for optimal SSR performance
  memory: 512Mi

env:
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
